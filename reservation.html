<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>訂位 | 老串角居酒屋</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>老串角居酒屋</h1>

<nav>

<a href="index.html">首頁</a>
<a href="menu.html">菜單</a>
<a href="reservation.html">訂位</a>

<select id="language">
<option>中文</option>
<option>English</option>
<option>日本語</option>
<option>한국어</option>
</select>

</nav>

</header>


<section class="reservation">

<h2>線上訂位</h2>

<form id="reservationForm">

<label>姓名</label>
<input type="text" required>

<label>電話</label>
<input type="tel" required>

<label>日期</label>
<input type="date" id="date" required>

<label>時間</label>
<input type="time" required>

<label>人數</label>

<select>

<option>1人</option>
<option>2人</option>
<option>3人</option>
<option>4人</option>
<option>5人</option>
<option>6人以上</option>

</select>

<label>備註</label>

<textarea placeholder="例如：需要兒童椅"></textarea>

<button type="submit">送出訂位</button>

</form>

<p id="successMessage" style="display:none;margin-top:20px;color:orange;">
訂位已送出，我們會與您聯絡確認！
</p>

</section>

<script src="script.js"></script>

</body>

</html>
